<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;scrollbar-width:none;-ms-overflow-style:none;}
  *::-webkit-scrollbar{display:none;}
  /* ── Auth overlay ── */
  #auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
  #boot-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;}
  .boot-logo{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--text);opacity:.6;}
  .auth-box{width:100%;max-width:380px;}
  .auth-logo{font-size:22px;font-weight:700;margin-bottom:6px;}
  .auth-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
  .auth-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .auth-tab{flex:1;padding:8px;font-size:13px;background:transparent;border:none;cursor:pointer;font-family:inherit;color:var(--text2);}
  .auth-tab.active{background:var(--bg2);color:var(--text);font-weight:500;}
  .auth-field{margin-bottom:14px;}
  .auth-field label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
  .auth-field input{width:100%;padding:9px 12px;font-size:14px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:inherit;outline:none;}
  .auth-field input:focus{border-color:#1D9E75;}
  .auth-err{font-size:12px;color:var(--red);margin-bottom:10px;min-height:16px;}
  .auth-ok{font-size:12px;color:var(--green);margin-bottom:10px;min-height:16px;}
  /* ── Paywall (inline in dashboard) ── */
  .paywall-inner{max-width:420px;margin:40px auto;text-align:center;padding:0 16px;}
  .paywall-title{font-size:22px;font-weight:600;margin-bottom:8px;}
  .paywall-sub{font-size:14px;color:var(--text2);margin-bottom:32px;line-height:1.6;max-width:400px;}
  .plan-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;width:100%;max-width:400px;}
  .plan-card{border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center;cursor:pointer;text-decoration:none;display:block;transition:border-color .15s;}
  .plan-card:hover{border-color:#1D9E75;}
  .plan-card.featured{border:2px solid #1D9E75;}
  .plan-price{font-size:26px;font-weight:700;font-family:var(--mono);color:var(--text);}
  .plan-period{font-size:12px;color:var(--text2);margin-bottom:6px;}
  .plan-label{font-size:13px;font-weight:500;margin-bottom:4px;color:var(--text);}
  .plan-badge{font-size:10px;background:#1D9E75;color:#fff;border-radius:4px;padding:2px 7px;display:inline-block;margin-bottom:8px;}
  /* ── Sync status ── */
  #sync-bar{font-size:11px;color:var(--text2);text-align:right;margin-bottom:8px;min-height:14px;}
  :root{
    --bg:#ffffff;--bg2:#f5f5f3;
    --text:#1a1a1a;--text2:#666;
    --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
    --green:#0f6e56;--red:#a32d2d;--amber:#854f0b;
    --radius:10px;--radius-sm:7px;
    --mono:'DM Mono','Courier New',monospace;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1c1c1e;--bg2:#2c2c2e;
      --text:#f0f0f0;--text2:#aaa;
      --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
      --green:#5dcaa5;--red:#f09595;--amber:#ef9f27;
    }
  }
  html,body{scrollbar-width:none;-ms-overflow-style:none;}
  html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);margin:0;padding:0;min-height:100vh;}
  /* ── App shell ── */
  #app{display:flex;min-height:100vh;}
  /* ── Sidebar ── */
  #sidebar{width:220px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:10;}
  #sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border);margin-bottom:8px;}
  #sidebar-logo .logo-text{font-size:17px;font-weight:600;letter-spacing:-.3px;color:var(--text);}
  #sidebar-logo .logo-sub{font-size:10px;color:var(--text2);margin-top:1px;letter-spacing:.05em;text-transform:uppercase;}
  #sidebar-nav{flex:1;padding:4px 10px;}
  .tab{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;font-size:13px;background:transparent;border:none;border-radius:8px;cursor:pointer;color:var(--text2);font-family:'DM Sans',sans-serif;font-weight:400;text-align:left;margin-bottom:2px;transition:background .12s,color .12s;}
  .tab:hover{background:var(--bg);color:var(--text);}
  .tab.active{background:var(--bg);color:var(--text);font-weight:500;}
  .tab .tab-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
  #sidebar-footer{padding:12px 10px;border-top:1px solid var(--border);}
  #sidebar-footer .user-email{font-size:11px;color:var(--text2);padding:0 4px;margin-bottom:6px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #sidebar-footer button{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;font-size:12px;background:transparent;border:none;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text2);transition:background .12s;}
  #sidebar-footer button:hover{background:var(--bg);color:var(--text);}
  /* ── Main content ── */
  #main-content{margin-left:220px;flex:1;padding:28px 40px;min-width:0;}
  #content-inner{max-width:860px;margin:0 auto;}
  #sync-bar{font-size:11px;color:var(--text2);text-align:right;margin-bottom:12px;min-height:14px;}
  /* ── Page header ── */
  .page-header{margin-bottom:24px;}
  .page-title{font-size:22px;font-weight:600;letter-spacing:-.3px;}
  /* ── Dash layout ── */
  .dash-top{display:grid;grid-template-columns:200px 1fr;gap:16px;margin-bottom:24px;align-items:start;}
  .dash-top .cards{display:flex;flex-direction:column;gap:8px;margin-bottom:0;}
  /* ── Mobile ── */
  @media(max-width:680px){
    #sidebar{width:100%;min-height:auto;position:relative;flex-direction:row;border-right:none;border-bottom:1px solid var(--border);}
    #sidebar-nav{display:flex;flex-direction:row;padding:4px 8px;overflow-x:auto;}
    #sidebar-logo,#sidebar-footer{display:none;}
    .tab{white-space:nowrap;padding:7px 10px;}
    #main-content{margin-left:0;padding:16px;}
    #content-inner{max-width:100%;}
    #app{flex-direction:column;}
    .dash-top{grid-template-columns:1fr;}
    .dash-top .cards{flex-direction:row;flex-wrap:wrap;}
  }
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
  .card{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;}
  .card-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
  .card-value{font-size:20px;font-weight:600;font-family:var(--mono);}
  .card-sub{font-size:11px;color:var(--text2);margin-top:3px;font-family:var(--mono);}
  .green{color:var(--green);}
  .red{color:var(--red);}
  .section-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 7px;}
  .list{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .list-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);}
  .list-row:last-child{border-bottom:none;}
  .row-right{display:flex;align-items:center;gap:10px;}
  .row-val{font-size:13px;font-family:var(--mono);color:var(--text);}
  .row-diff{font-size:11px;font-family:var(--mono);}
  .entry-bar{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;background:var(--bg2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:16px;}
  .field label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
  input[type=date],input[type=number],input[type=text],select{
    background:var(--bg);border:1px solid var(--border2);border-radius:6px;
    color:var(--text);font-family:inherit;padding:6px 10px;font-size:13px;outline:none;
  }
  input:focus,select:focus{border-color:#1D9E75;}
  input[type=number]{width:110px;text-align:right;font-family:var(--mono);}
  .live-total-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
  .live-total{font-size:18px;font-weight:600;font-family:var(--mono);color:var(--text);}
  button.primary{background:#1D9E75;color:#fff;border:none;border-radius:6px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  button.primary:hover{background:#0f6e56;}
  button.warn{background:transparent;border:1px solid var(--amber);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--amber);cursor:pointer;font-family:inherit;}
  button.warn:hover{background:var(--amber);color:#fff;}
  button.danger{background:transparent;border:1px solid var(--red);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--red);cursor:pointer;font-family:inherit;}
  button.danger:hover{background:var(--red);color:#fff;}
  button.ghost{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;}
  button.ghost:hover{color:var(--text);}
  .empty{text-align:center;padding:40px 16px;color:var(--text2);}
  .empty p{margin-bottom:14px;font-size:14px;}
  .chart-wrap{position:relative;width:100%;height:220px;margin-bottom:20px;}
  .badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;margin-left:6px;vertical-align:middle;}
  .badge-archived{background:rgba(133,79,11,0.12);color:var(--amber);}

  /* Manage tab */
  .mgmt-header{display:grid;grid-template-columns:1fr 140px 60px 120px;gap:8px;padding:6px 14px;
    background:var(--bg2);border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;}
  .mgmt-header span{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
  .mgmt-row{display:grid;grid-template-columns:1fr 140px 60px 120px;gap:8px;align-items:start;
    padding:8px 14px;background:var(--bg);border:1px solid var(--border);border-top:none;}
  .mgmt-row:last-child{border-radius:0 0 8px 8px;}
  .mgmt-row input[type=text],.mgmt-row select{min-width:0;width:100%;}
  .archived-row{background:var(--bg2);opacity:0.8;}
  .liq-wrap{display:flex;flex-direction:column;align-items:center;padding-top:5px;gap:3px;}
  .liq-wrap span{font-size:10px;color:var(--text2);}
  .liq-toggle{position:relative;display:inline-block;width:34px;height:20px;cursor:pointer;flex-shrink:0;}
  .liq-toggle input{opacity:0;width:0;height:0;position:absolute;}
  .liq-slider{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--border2);border-radius:20px;transition:.2s;cursor:pointer;}
  .liq-slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s;}
  .liq-toggle input:checked+.liq-slider{background:#1D9E75;}
  .liq-toggle input:checked+.liq-slider:before{transform:translateX(14px);}
  .badge-liquid{background:rgba(15,110,86,0.1);color:var(--green);}
  .add-form{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;margin-top:4px;display:flex;flex-direction:column;gap:10px;}
  .add-row{display:flex;gap:8px;flex-wrap:wrap;}
  .add-row input,.add-row select{flex:1;min-width:120px;}
  /* ── Onboarding overlay ── */
  #onboarding-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
  .onboarding-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:520px;padding:32px;position:relative;}
  .ob-step-indicator{display:flex;gap:6px;margin-bottom:24px;}
  .ob-step-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:background .2s;}
  .ob-step-dot.active{background:#1D9E75;}
  .ob-step-dot.done{background:#1D9E75;opacity:.4;}
  .ob-title{font-size:20px;font-weight:600;margin-bottom:8px;letter-spacing:-.2px;}
  .ob-sub{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:24px;}
  .ob-dismiss{position:absolute;top:16px;right:16px;font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:4px;}
  .ob-dismiss:hover{color:var(--text2);}
  .ob-footer{display:flex;justify-content:space-between;align-items:center;margin-top:24px;}
  .ob-skip{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;}
  .ob-skip:hover{color:var(--text2);}
  .ob-account-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .ob-account-row input[type=text]{flex:1;padding:7px 10px;font-size:13px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:inherit;outline:none;}
  .ob-account-row input[type=text]:focus{border-color:#1D9E75;}
  .ob-account-row select{padding:7px 8px;font-size:12px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:inherit;outline:none;}
  .ob-add-btn{font-size:12px;color:#1D9E75;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 0;margin-top:4px;}
  .ob-entry-row{display:grid;grid-template-columns:1fr 130px;gap:8px;align-items:center;margin-bottom:8px;}
  .ob-entry-row label{font-size:13px;color:var(--text);}
  .ob-entry-row input{padding:7px 10px;font-size:13px;font-family:var(--mono);background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);outline:none;text-align:right;}
  .ob-entry-row input:focus{border-color:#1D9E75;}
  .msg{font-size:12px;padding:7px 10px;border-radius:6px;margin-bottom:10px;}
  .msg.ok{background:rgba(15,110,86,0.1);color:var(--green);}
  .msg.err{background:rgba(163,45,45,0.1);color:var(--red);}
  .msg.warn{background:rgba(133,79,11,0.1);color:var(--amber);}
  .warn-box{background:rgba(133,79,11,0.08);border:1px solid rgba(133,79,11,0.25);border-radius:8px;padding:12px 14px;margin-bottom:10px;font-size:13px;color:var(--amber);display:none;}
  .warn-box b{font-weight:600;}
</style>
</head>

<script>
// Pre-declare globals so onclick handlers work before defer scripts run
var authTab='login';
function setAuthTab(t){
  authTab=t;
  document.querySelectorAll('.auth-tab').forEach((el,i)=>el.classList.toggle('active',['login','signup'][i]===t));
  var btn=document.getElementById('auth-btn');
  if(btn) btn.textContent=t==='login'?'Sign in':'Create account';
  var fw=document.getElementById('auth-forgot-wrap');
  if(fw) fw.style.display=t==='login'?'':'none';
  var err=document.getElementById('auth-err');
  if(err) err.textContent='';
  var ok=document.getElementById('auth-ok');
  if(ok) ok.textContent='';
}
function submitAuth(){
  var err=document.getElementById('auth-err');
  if(err) err.textContent='Loading, please wait...';
}
function forgotPassword(){
  var err=document.getElementById('auth-err');
  if(err) err.textContent='Loading, please wait...';
}
</script>

<!-- Boot screen — shown while checking session -->
<div id="boot-screen"><div class="boot-logo">Networth.fyi</div></div>

<!-- Auth overlay — shown when logged out -->
<div id="auth-overlay">
  <div class="auth-box">
    <div class="auth-logo">Networth.fyi</div>
    <div class="auth-sub">Your net worth. Your data. Private by default.</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="setAuthTab('login')">Sign in</button>
      <button class="auth-tab" onclick="setAuthTab('signup')">Create account</button>
    </div>
    <div class="auth-field"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')submitAuth()"/></div>
    <div class="auth-field"><label>Password</label><input type="password" id="auth-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitAuth()"/></div>
    <div class="auth-err" id="auth-err"></div>
    <div class="auth-ok" id="auth-ok"></div>
    <button class="primary" style="width:100%;padding:10px;font-size:14px" onclick="submitAuth()" id="auth-btn">Sign in</button>
    <p style="font-size:11px;color:var(--text2);margin-top:14px;text-align:center">
      <span id="auth-forgot-wrap"><a href="#" onclick="forgotPassword();return false" style="color:var(--text2)">Forgot password?</a></span>
    </p>
    <p style="font-size:11px;color:var(--text3);margin-top:6px;text-align:center">Your username is your email address</p>
  </div>
</div>

<!-- Onboarding overlay -->
<div id="onboarding-overlay">
  <div class="onboarding-box">
    <button class="ob-dismiss" onclick="dismissOnboarding()" title="Don't show again">✕ Don't show again</button>
    <div class="ob-step-indicator" id="ob-dots"></div>
    <div id="ob-content"></div>
  </div>
</div>

<!-- Main app -->

  <nav id="sidebar">

    </div>

      <button class="tab active" onclick="switchTab('dashboard')">
        <span class="tab-icon">◎</span> Dashboard

</div><!-- end #app -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const DEFAULT_ACCOUNTS=[
  {cat:'Brokerage',  name:'Fidelity',      liquid:true,  archived:false},
  {cat:'Savings',    name:'Family Savings', liquid:true,  archived:false},
  {cat:'Retirement', name:'401K',           liquid:false, archived:false},
  {cat:'Real Estate',name:'Home Equity',    liquid:false, archived:false},
];

let accounts=[], entries=[], currentTab='dashboard', fv={};
let histChart=null, dashLineChart=null;
let delEntryConfirm=false, archiveConfirm=null, permDelConfirm=null;
let dashFilter='all', dashFromDate='', dashToDate='', selectedCat=null;
let editingEntryIdx=null;
let showActual=true, showForecast=true, momMode='$'; // chart toggles

const DEFAULT_SETTINGS={forecastYears:3,lookbackMonths:12,birthday:'',goalAmount:''};
let settings={...DEFAULT_SETTINGS};

function loadSettings(){
  try{const s=localStorage.getItem('nw_settings');if(s)settings={...DEFAULT_SETTINGS,...JSON.parse(s)};}
  catch(e){settings={...DEFAULT_SETTINGS};}
}

const $=id=>document.getElementById(id);
const fmt=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
const fmtD=n=>(n>=0?'+':'')+fmt(n);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

// Sum ALL values in an entry (active + archived) — keeps totals accurate forever
const sumE=e=>Object.values(e.values).reduce((a,b)=>a+(b||0),0);

const activeAccounts=()=>accounts.filter(a=>!a.archived);
const archivedAccounts=()=>accounts.filter(a=>a.archived);
const getCats=()=>[...new Set(activeAccounts().map(a=>a.cat))];

// Last known value for an account across all entries
const lastVal=(name)=>{
  for(let i=entries.length-1;i>=0;i--){
    if(entries[i].values[name]!=null) return entries[i].values[name];
  }
  return 0;
};

function load(){
  try{const d=localStorage.getItem('nw_entries');if(d)entries=JSON.parse(d);}catch(e){entries=[];}
  try{
    const a=localStorage.getItem('nw_accounts');
    accounts=a?JSON.parse(a):JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));
    // backfill archived and liquid flags for older saved data
    accounts.forEach(a=>{
      if(a.archived===undefined) a.archived=false;
      if(a.liquid===undefined) a.liquid=false;
    });

    if(accounts.length===0){
      accounts=JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));
      persistAccounts();
    }
  }catch(e){accounts=JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));}
}

function avgMonthlyChange3m(){
  if(entries.length<2) return null;
  const last=entries[entries.length-1];
  const lastDate=new Date(last.date);
  const cutoff=new Date(lastDate);
  cutoff.setMonth(cutoff.getMonth()-3);
  let closest=entries[0],minDiff=Infinity;
  entries.forEach(e=>{const d=Math.abs(new Date(e.date)-cutoff);if(d<minDiff){minDiff=d;closest=e;}});
  if(closest.date===last.date) return null;
  const startVal=sumE(closest),endVal=sumE(last);
  const totalDiff=endVal-startVal;
  const monthsDiff=(lastDate-new Date(closest.date))/(1000*60*60*24*30.44);
  if(monthsDiff<0.5) return null;
  const avgDollar=Math.round(totalDiff/monthsDiff);
  const avgPct=startVal>0?Math.round(totalDiff/startVal/monthsDiff*1000)/10:null;
  return {dollar:avgDollar,pct:avgPct};
}

function getFilteredEntries(){
  if(!entries.length) return entries;
  if(dashFilter==='custom') return entries.filter(e=>(!dashFromDate||e.date>=dashFromDate)&&(!dashToDate||e.date<=dashToDate));
  if(dashFilter==='all') return entries;
  const last=new Date(entries[entries.length-1].date);
  const months={'6m':6,'1y':12,'3y':36}[dashFilter]||9999;
  const cutoff=new Date(last); cutoff.setMonth(cutoff.getMonth()-months);
  const cs=cutoff.toISOString().split('T')[0];
  return entries.filter(e=>e.date>=cs);
}

}

function getCatAccountRows(cat,fe){
  if(!fe.length) return [];
  return activeAccounts().filter(a=>a.cat===cat).map(a=>{
    let first=0,last=0;
    for(let i=0;i<fe.length;i++){if((fe[i].values[a.name]||0)>0){first=fe[i].values[a.name];break;}}
    for(let i=fe.length-1;i>=0;i--){if(fe[i].values[a.name]!=null){last=fe[i].values[a.name];break;}}
    const chg=last-first,pct=first?(chg/first*100):(last?100:0);
    return {name:a.name,first,last,chg,pct};
  }).filter(r=>r.first>0||r.last>0);
}

let dashMoMChart=null, dashPieChart=null;

function getMoMData(filteredEntries){
  const src=filteredEntries||entries;
  if(src.length<2) return [];

  // Build a map of date -> net worth using only actual (non-forecast) entries
  const actual={};
  src.forEach(e=>{ actual[e.date]=sumE(e); });
  const sortedDates=Object.keys(actual).sort();

  // Range: from first to last actual entry in the filtered set — never future
  const firstDate=new Date(sortedDates[0]);
  const lastDate=new Date(sortedDates[sortedDates.length-1]);

  function interpolate(targetDateStr){
    if(actual[targetDateStr]!=null) return actual[targetDateStr];
    let before=null,after=null;
    for(let i=0;i<sortedDates.length;i++){
      if(sortedDates[i]<=targetDateStr) before=sortedDates[i];
      else if(after===null) after=sortedDates[i];
    }
    if(!before) return actual[after];
    if(!after)  return actual[before];
    const t0=new Date(before).getTime(),t1=new Date(after).getTime(),t=new Date(targetDateStr).getTime();
    const frac=(t-t0)/(t1-t0);
    return actual[before]+(actual[after]-actual[before])*frac;
  }

  const result=[];
  let y=firstDate.getFullYear(), m=firstDate.getMonth();
  const endY=lastDate.getFullYear(), endM=lastDate.getMonth();
  let prevVal=null;

  while(y<endY||(y===endY&&m<=endM)){
    const pad=n=>String(n).padStart(2,'0');
    const label=`${y}-${pad(m+1)}`;
    const dateStr=`${y}-${pad(m+1)}-15`;
    const val=interpolate(dateStr);
    if(prevVal!==null&&val!=null){
      const diff=val-prevVal;
      const pct=prevVal?Math.round(diff/prevVal*10000)/100:0;
      result.push({label,diff:Math.round(diff),pct});
    }
    prevVal=val;
    m++; if(m>11){m=0;y++;}
  }
  return result;
}

function getYearlyData(){
  if(entries.length<2) return [];
  const byYear={};
  entries.forEach(e=>{const y=e.date.slice(0,4);byYear[y]=e;});
  const years=Object.keys(byYear).sort();
  const result=[];
  for(let i=1;i<years.length;i++){
    const pv=sumE(byYear[years[i-1]]),cv=sumE(byYear[years[i]]);
    const pct=pv?Math.round((cv-pv)/pv*1000)/10:0;
    result.push({year:years[i],pct,diff:cv-pv});
  }
  return result;
}

function getCatPieData(){
  if(!entries.length) return [];
  const last=entries[entries.length-1];
  const total=sumE(last);
  if(!total) return [];
  return getCats().map(cat=>{
    const val=activeAccounts().filter(a=>a.cat===cat).reduce((s,a)=>s+(last.values[a.name]||0),0);
    return {cat,val,pct:total?Math.round(val/total*1000)/10:0};
  }).filter(d=>d.val>0).sort((a,b)=>b.val-a.val);
}

let obStep=1;
const OB_STEPS=4;
const OB_CATS=['Brokerage','Savings','Retirement','Real Estate','HSA','Crypto','Business','529','Other'];

function shouldShowOnboarding(s){
  if(!s) return false;
  if(s.onboarding_dismissed) return false;
  if(entries.length>0) return false; // has data already
  const trialStart=s.trial_start;
  if(!trialStart) return false;
  const daysSince=(Date.now()-new Date(trialStart).getTime())/(1000*60*60*24);
  return daysSince<=30;
}

function showOnboarding(){
  obStep=1;
  $('onboarding-overlay').style.display='flex';
  renderObStep();
}

function hideOnboarding(){
  $('onboarding-overlay').style.display='none';
}

async function dismissOnboarding(){
  hideOnboarding();
  if(currentUser){
    await sb.from('user_settings').upsert({
      user_id:currentUser.id,
      onboarding_dismissed:true,
      updated_at:new Date().toISOString()
    },{onConflict:'user_id'});
  }
}

function renderObDots(){
  const el=$('ob-dots');
  if(!el) return;
  el.innerHTML=Array.from({length:OB_STEPS},(_,i)=>{
    const n=i+1;
    const cls=n===obStep?'active':n<obStep?'done':'';
    return `<div class="ob-step-dot ${cls}"></div>`;
  }).join('');
}

  renderObDots();

      <button class="ob-add-btn" onclick="obAddAccount()">+ Add another account</button>
      <div class="ob-footer">
        <button class="ob-skip" onclick="hideOnboarding()">Do this later</button>
        <button class="primary" onclick="obSaveAccountsAndNext()">Save & continue →</button>
      </div>`;

  } else if(obStep===3){
    const rows=activeAccounts().map((a,i)=>`
      <div class="ob-entry-row">
        <label>${esc(a.name)}<span style="font-size:10px;color:var(--text3);margin-left:6px;">${esc(a.cat)}</span></label>

function obUpdateAccount(idx, field, val){
  if(accounts[idx]) accounts[idx][field===('cat')?'cat':'name']=val;
}

function obRemoveAccount(idx){
  accounts.splice(idx,1);
  renderObStep();
}

function obAddAccount(){
  accounts.push({name:'',cat:'Savings',liquid:false,archived:false});
  renderObStep();
  // Focus the new input
  setTimeout(()=>{
    const rows=document.querySelectorAll('.ob-account-row input[type=text]');
    if(rows.length) rows[rows.length-1].focus();
  },50);
}

async function obSaveAccountsAndNext(){
  // Remove empty accounts
  accounts=accounts.filter(a=>a.name.trim());
  if(!accounts.length){
    accounts=JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));
  }
  persistAccounts();
  obStep=3;
  renderObStep();
}

async function obSaveEntryAndNext(){
  const inputs=document.querySelectorAll('#ob-content input[data-acc]');
  const values={};
  inputs.forEach(inp=>{
    const v=parseFloat(inp.value)||0;
    if(v>0) values[inp.dataset.acc]=v;
  });

  if(Object.keys(values).length>0){
    const today=new Date().toISOString().split('T')[0];
    const entry={date:today,values};
    entries.push(entry);
    entries.sort((a,b)=>a.date<b.date?-1:1);
    persist();
    if(currentUser){
      setSyncBar('Saving...');
      try{
        await saveEntryToSupabase(entry);
        setSyncBar('Saved ✓','var(--green)');
        setTimeout(()=>setSyncBar(''),2000);
      }catch(e){setSyncBar('');}
    }
  }
  obStep=4;
  renderObStep();
}

function obNext(){
  obStep++;
  renderObStep();
}

  } else {

    const rows=getCatAccountRows(selectedCat,fe);
    const catCur=rows.reduce((s,r)=>s+r.last,0),catFirst=rows.reduce((s,r)=>s+r.first,0);

        <span style="font-size:12px;font-family:var(--mono);text-align:right;color:${r.chg===0?'var(--text2)':r.pct>0?'var(--green)':'var(--red)'}">${r.chg===0?'—':(r.pct>=0?'+':'')+r.pct.toFixed(1)+'%'}</span>

function renderDashCharts(){
  const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const tickColor=dark?'#888':'#666',gridColor=dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  const fe=getFilteredEntries();

  // Update pill button states if they exist (without re-rendering whole dash)
  document.querySelectorAll('[data-pill]').forEach(b=>{
    const active=(b.dataset.pill==='actual'&&showActual)||(b.dataset.pill==='forecast'&&showForecast)||(b.dataset.pill===momMode);
    b.style.background=active?'#1D9E75':'transparent';
    b.style.color=active?'#fff':'var(--text2)';
    b.style.borderColor=active?'#1D9E75':'var(--border2)';
  });

  const lineCtx=$('dashLineChart');
  if(lineCtx){
    if(dashLineChart){dashLineChart.destroy();dashLineChart=null;}
    const isCat=selectedCat!==null;
    const actualVals=isCat?getCatTimeSeries(selectedCat,fe):fe.map(sumE);
    const color=isCat?'#378ADD':'#1D9E75';
    const bgAlpha=dark?'0.1':'0.07';
    const bg=isCat?`rgba(55,138,221,${bgAlpha})`:`rgba(29,158,117,${bgAlpha})`;

    // For category drilldown, always show actual regardless of toggles
    const showActualLine = isCat ? true : showActual;
    const forecast=(!isCat&&showForecast)?getForecastDatasets(fe,color):null;
    const hasForecast=forecast&&forecast.labels&&forecast.labels.length>1;

    // Build label set based on what's visible
    let allLabels;
    if(showActualLine&&hasForecast) allLabels=[...new Set([...fe.map(e=>e.date),...forecast.labels])].sort();
    else if(showActualLine)         allLabels=fe.map(e=>e.date);
    else if(hasForecast)            allLabels=forecast.labels;
    else                            allLabels=fe.map(e=>e.date);

    const datasets=[];
    if(showActualLine){
      const padded=allLabels.map(l=>{const idx=fe.findIndex(e=>e.date===l);return idx>=0?actualVals[idx]:null;});
      datasets.push({label:isCat?selectedCat:'Net worth',data:padded,borderColor:color,backgroundColor:bg,fill:true,tension:0.35,pointRadius:fe.length>20?2:4,pointBackgroundColor:color,borderWidth:2,spanGaps:false});
    }
    if(hasForecast){
      const padded=allLabels.map(l=>{const idx=forecast.labels.indexOf(l);return idx>=0?forecast.data[idx]:null;});
      datasets.push({...forecast.dataset,data:padded,spanGaps:false});
    }

    const yFmt=v=>v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1000?'$'+(v/1000).toFixed(0)+'k':'$'+v;
    dashLineChart=new Chart(lineCtx,{
      type:'line',
      data:{labels:allLabels,datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:c=>c.raw!=null?`${c.dataset.label}: ${fmt(c.raw)}`:null,filter:i=>i.raw!=null}}
        },
        scales:{
          y:{ticks:{callback:yFmt,font:{size:11},color:tickColor},grid:{color:gridColor}},
          x:{ticks:{font:{size:11},maxRotation:0,color:tickColor,autoSkip:true,maxTicksLimit:10,callback:(val,idx)=>{
            const label=allLabels[idx]||'';
            if(!settings.birthday) return label;
            const age=dateToAge(label);
            return age!==null?[label,`age ${age}`]:label;
          }},grid:{display:false}}
        }
      }
    });
  }

  // MoM bar chart
  const momCtx=$('dashMoMChart');
  if(momCtx){
    if(dashMoMChart){dashMoMChart.destroy();dashMoMChart=null;}
    // Use only actual filtered entries — never forecast dates
    const md=getMoMData(fe);
    if(md.length){
      const usePct=momMode==='%';
      const vals=md.map(d=>usePct?d.pct:d.diff);
      const maxLabels=18, step=Math.ceil(md.length/maxLabels);
      const displayLabels=md.map((d,i)=>i%step===0?d.label:'');
      const yFmtMoM=usePct?v=>`${v>0?'+':''}${v}%`:v=>v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1000?'$'+(v/1000).toFixed(0)+'k':'$'+v;
      dashMoMChart=new Chart(momCtx,{
        type:'bar',
        data:{
          labels:displayLabels,
          datasets:[{
            label:usePct?'% change':'$ change',
            data:vals,
            backgroundColor:vals.map(v=>v>=0?'rgba(29,158,117,0.7)':'rgba(162,45,45,0.7)'),
            borderColor:vals.map(v=>v>=0?'#1D9E75':'#a32d2d'),
            borderWidth:1,borderRadius:2
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{
            legend:{display:false},
            tooltip:{callbacks:{
              title:(_,[{dataIndex}])=>md[dataIndex].label,
              label:c=>{const d=md[c.dataIndex];return usePct?[`${d.pct>=0?'+':''}${d.pct}%`,fmtD(d.diff)]:[fmtD(d.diff),`${d.pct>=0?'+':''}${d.pct}%`];}
            }}
          },
          scales:{
            y:{ticks:{callback:yFmtMoM,font:{size:10},color:tickColor},grid:{color:gridColor},border:{dash:[3,3]}},
            x:{ticks:{font:{size:10},color:tickColor,maxRotation:45},grid:{display:false}}
          }
        }
      });
    }
  }

  // Category pie chart
  const pieCtx=$('dashPieChart');
  if(pieCtx){
    if(dashPieChart){dashPieChart.destroy();dashPieChart=null;}
    const pd=getCatPieData();
    if(pd.length){
      const PIE_COLORS=['#1D9E75','#378ADD','#E24B4A','#EF9F27','#D4537E','#7F77DD','#639922','#BA7517','#1D9E75'];
      dashPieChart=new Chart(pieCtx,{
        type:'doughnut',
        data:{
          labels:pd.map(d=>d.cat),
          datasets:[{
            data:pd.map(d=>d.val),
            backgroundColor:PIE_COLORS.slice(0,pd.length),
            borderWidth:2,
            borderColor:dark?'#1c1c1e':'#ffffff'
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          cutout:'58%',
          plugins:{
            legend:{display:false},
            tooltip:{callbacks:{
              label:c=>`${fmt(c.raw)}  (${pd[c.dataIndex].pct}%)`
            }}
          }
        }
      });
      // Custom legend
      const legend=$('pie-legend');
      if(legend){
        legend.innerHTML=pd.map((d,i)=>`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;gap:10px">
            <div style="display:flex;align-items:center;gap:7px;min-width:0">
              <span style="width:10px;height:10px;border-radius:2px;background:${PIE_COLORS[i]};flex-shrink:0"></span>
              <span style="font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.cat)}</span>
            </div>
            <div style="display:flex;gap:8px;flex-shrink:0;align-items:center">
              <span style="font-size:11px;color:var(--text2);font-family:var(--mono)">${d.pct}%</span>
              <span style="font-size:12px;font-family:var(--mono);color:var(--text)">${fmt(d.val)}</span>
            </div>
          </div>`).join('');
      }
    }
  }

  // Category drilldown pie (accounts within selected category)
  const catPieCtx=$('catPieChart');
  if(catPieCtx&&selectedCat!==null){
    const PIE_COLORS2=['#1D9E75','#378ADD','#E24B4A','#EF9F27','#D4537E','#7F77DD','#639922','#BA7517','#5dcaa5'];
    const fe=getFilteredEntries();
    const lastFe=fe.length?fe[fe.length-1]:null;
    if(lastFe){
      const accs=activeAccounts().filter(a=>a.cat===selectedCat);
      const catData=accs.map(a=>({name:a.name,val:lastFe.values[a.name]||0})).filter(d=>d.val>0);
      const catTotal=catData.reduce((s,d)=>s+d.val,0);
      if(catData.length&&catTotal){
        let catPieInst=Chart.getChart(catPieCtx);
        if(catPieInst){catPieInst.destroy();}
        new Chart(catPieCtx,{
          type:'doughnut',
          data:{
            labels:catData.map(d=>d.name),
            datasets:[{data:catData.map(d=>d.val),backgroundColor:PIE_COLORS2.slice(0,catData.length),borderWidth:2,borderColor:dark?'#1c1c1e':'#ffffff'}]
          },
          options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmt(c.raw)}  (${Math.round(c.raw/catTotal*1000)/10}%)`}}}}
        });
        const catLeg=$('cat-pie-legend');
        if(catLeg){
          catLeg.innerHTML=catData.map((d,i)=>`
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px">
              <div style="display:flex;align-items:center;gap:6px;min-width:0">
                <span style="width:9px;height:9px;border-radius:2px;background:${PIE_COLORS2[i]};flex-shrink:0"></span>
                <span style="font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.name)}</span>
              </div>
              <div style="display:flex;gap:6px;flex-shrink:0">
                <span style="font-size:10px;color:var(--text2);font-family:var(--mono)">${Math.round(d.val/catTotal*1000)/10}%</span>
                <span style="font-size:11px;font-family:var(--mono);color:var(--text)">${fmt(d.val)}</span>
              </div>
            </div>`).join('');
        }
      }
    }
  }
}

/* ─────────────────────────────────────────
   History
───────────────────────────────────────── */
function renderHist(){
  const el=$('pane-history');
  if(!entries.length){el.innerHTML=`<div class="empty"><p>No entries yet.</p></div>`;return;}

  if(editingEntryIdx!==null){
    const entry=entries[editingEntryIdx];
    if(!entry){editingEntryIdx=null;renderHist();return;}

    // Build list of accounts to show: active accounts + any archived/deleted accounts
    // that had a non-zero value in this entry
    const activeNames=new Set(activeAccounts().map(a=>a.name));
    const extraNames=Object.keys(entry.values).filter(n=>!activeNames.has(n)&&(entry.values[n]||0)>0);

    // Group active accounts by category
    const cats=getCats();

    let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <button onclick="cancelEdit()" style="padding:4px 12px;font-size:12px;border-radius:6px;cursor:pointer;font-family:inherit;border:1px solid var(--border2);background:transparent;color:var(--text2)">← Back</button>
      <span style="font-size:15px;font-weight:600">Editing entry</span>
    </div>
    <div class="entry-bar">
      <div class="field"><label>Date</label><input type="date" id="edit-date" value="${entry.date}"/></div>
      <div><div class="live-total-label">Running total</div><div class="live-total" id="edit-total">${fmt(Object.values(entry.values).reduce((a,b)=>a+b,0))}</div></div>
      <div style="margin-left:auto;align-self:flex-end"><button class="primary" onclick="saveEditedEntry()">Save changes</button></div>
    </div>`;

    cats.forEach(cat=>{
      const accs=activeAccounts().filter(a=>a.cat===cat);
      if(!accs.length)return;
      html+=`<div class="section-label">${esc(cat)}</div><div class="list">`;
      accs.forEach(a=>{
        const id='edit-'+a.name.replace(/[^a-z0-9]/gi,'-');
        const val=entry.values[a.name]||0;
        html+=`<div class="list-row"><label for="${id}" style="font-size:13px">${esc(a.name)}</label><div class="row-right"><span style="font-size:13px;color:var(--text2)">$</span><input type="number" id="${id}" data-acc="${esc(a.name)}" value="${val}" min="0" step="1" oninput="onEditInput(this)"/></div></div>`;
      });
      html+=`</div>`;
    });

    // Archived/deleted accounts that had values in this entry
    if(extraNames.length>0){
      html+=`<div class="section-label">Archived / removed accounts <span style="font-size:10px;font-weight:400;color:var(--text2)">(had values on this date)</span></div><div class="list">`;
      extraNames.forEach(name=>{
        const id='edit-'+name.replace(/[^a-z0-9]/gi,'-');
        const val=entry.values[name]||0;
        html+=`<div class="list-row"><label for="${id}" style="font-size:13px;color:var(--text2)">${esc(name)}</label><div class="row-right"><span style="font-size:13px;color:var(--text2)">$</span><input type="number" id="${id}" data-acc="${esc(name)}" value="${val}" min="0" step="1" oninput="onEditInput(this)"/></div></div>`;
      });
      html+=`</div>`;
    }

    el.innerHTML=html;
    return;
  }

  // Normal history list
  let html=`<div class="section-label">All entries</div><div class="list">`;
  [...entries].reverse().forEach((entry,i)=>{
    const idx=entries.length-1-i,prev=idx>0?entries[idx-1]:null;
    const total=sumE(entry),diff=prev?total-sumE(prev):null;
    html+=`<div class="list-row">
      <span style="font-size:13px">${entry.date}</span>
      <div class="row-right">
        ${diff!==null?`<span class="row-diff ${diff>=0?'green':'red'}">${fmtD(diff)}</span>`:''}
        <span class="row-val">${fmt(total)}</span>
        <button onclick="startEditEntry(${idx})" style="padding:3px 10px;font-size:12px;border-radius:5px;cursor:pointer;font-family:inherit;border:1px solid var(--border2);background:transparent;color:var(--text2)">Edit</button>
      </div>
    </div>`;
  });
  html+=`</div><div style="margin-top:12px;display:flex;justify-content:flex-end"><button class="danger" id="del-btn" onclick="delLast()">Delete last entry</button></div>`;
  el.innerHTML=html;
}

function startEditEntry(idx){
  editingEntryIdx=idx;
  renderHist();
}

function cancelEdit(){
  editingEntryIdx=null;
  renderHist();
}

function onEditInput(inp){
  const val=parseFloat(inp.value)||0;
  const name=inp.dataset.acc;
  // update live total
  const allInputs=document.querySelectorAll('#pane-history input[data-acc]');
  let total=0;
  allInputs.forEach(i=>{total+=parseFloat(i.value)||0;});
  const el=$('edit-total');if(el)el.textContent=fmt(total);
}

function saveEditedEntry(){
  if(editingEntryIdx===null) return;
  const dateEl=$('edit-date');
  if(!dateEl||!dateEl.value) return;
  const allInputs=document.querySelectorAll('#pane-history input[data-acc]');
  const values={};
  allInputs.forEach(inp=>{
    const v=parseFloat(inp.value)||0;
    if(v>0) values[inp.dataset.acc]=v;
  });
  entries[editingEntryIdx]={date:dateEl.value,values};
  entries.sort((a,b)=>a.date<b.date?-1:1);
  persist();
  editingEntryIdx=null;
  renderHist();
}

  const newName=inp.value.trim();
  inp.style.borderColor='';

    inp.style.borderColor='var(--red)';
    showMsg(`<div class="msg err">"${esc(newName)}" already exists.</div>`,4000);

  persistAccounts();persist();fv={};
  showMsg(`<div class="msg ok">Renamed to "${esc(newName)}".</div>`);
}

/* ─────────────────────────────────────────
   Forecast helpers
───────────────────────────────────────── */
function linReg(points){
  // points = [{x: days_from_epoch, y: value}]
  const n=points.length;
  if(n<2) return null;
  let sx=0,sy=0,sxy=0,sx2=0;
  points.forEach(p=>{sx+=p.x;sy+=p.y;sxy+=p.x*p.y;sx2+=p.x*p.x;});
  const denom=n*sx2-sx*sx;
  if(!denom) return null;
  const m=(n*sxy-sx*sy)/denom;
  const b=(sy-m*sx)/n;
  return {m,b};
}

function dateToDay(dateStr){
  return Math.floor(new Date(dateStr).getTime()/(1000*60*60*24));
}

function dateToAge(dateStr){
  if(!settings.birthday) return null;
  const bday=new Date(settings.birthday);
  const date=new Date(dateStr);
  let age=date.getFullYear()-bday.getFullYear();
  const m=date.getMonth()-bday.getMonth();
  if(m<0||(m===0&&date.getDate()<bday.getDate())) age--;
  return age>0?age:null;
}

function getForecastDatasets(fe,color){
  if(!fe.length||!settings.forecastYears||settings.forecastYears<=0) return [];

  // Determine lookback window
  const lastEntry=fe[fe.length-1];
  const lastDay=dateToDay(lastEntry.date);
  const lookbackDays=settings.lookbackMonths*30.44;
  const cutoffDay=lastDay-lookbackDays;
  const window=fe.filter(e=>dateToDay(e.date)>=cutoffDay);
  if(window.length<2) return [];

  const points=window.map(e=>({x:dateToDay(e.date),y:sumE(e)}));
  const reg=linReg(points);
  if(!reg) return [];

  // Generate forecast points monthly
  const forecastDays=Math.round(settings.forecastYears*365);
  const stepDays=30;
  const forecastLabels=[];
  const forecastVals=[];

  // Start from last actual point
  for(let d=0;d<=forecastDays;d+=stepDays){
    const day=lastDay+d;
    const val=reg.m*day+reg.b;
    if(val<0) break; // don't project negative net worth
    const date=new Date(day*1000*60*60*24);
    forecastLabels.push(date.toISOString().split('T')[0]);
    forecastVals.push(Math.round(val));
  }

  if(!forecastLabels.length) return [];

  // Prepend last actual value so lines connect
  const connectVal=Math.round(reg.m*lastDay+reg.b);

  return {
    labels:forecastLabels,
    data:[connectVal,...forecastVals.slice(1)],
    dataset:{
      label:'Forecast',
      data:[connectVal,...forecastVals.slice(1)],
      borderColor:color==='#378ADD'?'rgba(55,138,221,0.5)':'rgba(29,158,117,0.45)',
      backgroundColor:'transparent',
      borderDash:[6,4],
      borderWidth:2,
      pointRadius:0,
      pointHoverRadius:4,
      fill:false,
      tension:0.2
    }
  };
}

function downloadImportTemplate(){
  const accs=activeAccounts().map(a=>a.name);
  const header=['Date',...accs].join(',');
  const example=[new Date().toISOString().split('T')[0],...accs.map(()=>0)].join(',');
  const csv=header+'\n'+example+'\n';
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='networth_import_template.csv';a.click();
  URL.revokeObjectURL(url);
}

function exportCSV(){
  if(!entries.length){showMsg('<div class="msg warn">No entries to export.</div>',3000);return;}
  const allAccs=[...new Set(entries.flatMap(e=>Object.keys(e.values)))].sort();
  const header=['Date',...allAccs].join(',');
  const rows=entries.map(e=>[e.date,...allAccs.map(a=>e.values[a]||0)].join(','));
  const csv=header+'\n'+rows.join('\n')+'\n';
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='networth_export.csv';a.click();
  URL.revokeObjectURL(url);
}

async function importCSV(input){
  const msg=$('import-msg');
  const file=input.files[0];
  if(!file){return;}
  if(msg) msg.innerHTML='<span style="color:var(--text2)">Reading file...</span>';
  try{
    const text=await file.text();
    const lines=text.trim().split('\n').filter(l=>l.trim());
    if(lines.length<2){throw new Error('File must have at least a header row and one data row.');}

    // Parse header
    const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
    if(headers[0].toLowerCase()!=='date'){throw new Error('First column must be "Date".');}
    const accs=headers.slice(1);

    // Validate accounts exist
    const knownAccs=new Set(accounts.map(a=>a.name));
    const missing=accs.filter(a=>!knownAccs.has(a));
    if(missing.length>0){
      // Auto-add missing accounts
      missing.forEach(name=>{
        if(!accounts.find(a=>a.name===name)){
          accounts.push({name,cat:'Other',liquid:false,archived:false});
        }
      });
      persistAccounts();
    }

    // Parse rows
    let imported=0, skipped=0;
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      const date=cols[0];
      if(!date||!/^\d{4}-\d{2}-\d{2}$/.test(date)){skipped++;continue;}
      const values={};
      accs.forEach((name,j)=>{
        const v=parseFloat(cols[j+1])||0;
        if(v>0) values[name]=v;
      });
      if(!Object.keys(values).length){skipped++;continue;}
      const existing=entries.findIndex(e=>e.date===date);
      const entry={date,values};
      if(existing>=0) entries[existing]=entry;
      else entries.push(entry);
      imported++;
    }
    entries.sort((a,b)=>a.date<b.date?-1:1);
    persist();

    // Save to Supabase
    if(msg) msg.innerHTML='<span style="color:var(--text2)">Saving to cloud...</span>';
    if(currentUser){
      for(const e of entries){
        await saveEntryToSupabase(e);
      }
    }

    if(msg) msg.innerHTML=`<div class="msg ok">Imported ${imported} entries${skipped>0?` (${skipped} skipped)`:''}. Redirecting to dashboard...</div>`;
    input.value='';
    setTimeout(()=>switchTab('dashboard'),1500);
  } catch(e){
    console.error('Import error:',e);
    if(msg) msg.innerHTML=`<div class="msg err">${e.message||'Import failed. Check your file format.'}</div>`;
    input.value='';
  }
}

const TRIAL_DAYS=14;
const LS_MONTHLY_VARIANT='1540147';
const LS_LIFETIME_VARIANT='1540148';

function getTrialDaysLeft(trialStart){
  if(!trialStart) return TRIAL_DAYS;
  const start=new Date(trialStart);
  const now=new Date();
  const elapsed=(now-start)/(1000*60*60*24);
  return Math.max(0,Math.ceil(TRIAL_DAYS-elapsed));
}

function checkAccess(s){
  if(!s) return {allowed:true,status:'trialing',daysLeft:TRIAL_DAYS};
  const status=s.subscription_status||'trialing';
  if(status==='active') return {allowed:true,status:'active',daysLeft:null};
  const daysLeft=getTrialDaysLeft(s.trial_start);
  if(daysLeft>0) return {allowed:true,status:'trialing',daysLeft};
  return {allowed:false,status:'expired',daysLeft:0};
}

async function loadFromSupabase(){
  if(!currentUser) return;
  setSyncBar('');
  try{
    // Load accounts
      const {data:accts,error:ae}=await sb.from('accounts').select('*').eq('user_id',currentUser.id).order('sort_order');
      if(ae){console.error('accounts error:',ae);throw ae;}

    // Load entries

      if(ee){console.error('entries error:',ee);throw ee;}

    let entryValues=[];
    if(ents&&ents.length>0){
      const entryIds=ents.map(e=>e.id);
          const {data:vals,error:ve}=await sb.from('entry_values').select('*').in('entry_id',entryIds);
          if(ve){console.error('values error:',ve);throw ve;}
      entryValues=vals||[];
    }

    // Load settings
      const {data:s}=await sb.from('user_settings').select('*').eq('user_id',currentUser.id).maybeSingle();
      if(accts&&accts.length>0){
      accounts=accts.map(a=>({name:a.name,cat:a.category,liquid:a.liquid,archived:a.archived,_id:a.id}));
    } else {
      // First time user — use defaults locally, save in background
      accounts=JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));
      saveAccountsToSupabase().catch(e=>console.error('seed accounts error:',e));
    }

    // Map entries
    entries=(ents||[]).map(e=>{
      const vals=entryValues.filter(v=>v.entry_id===e.id);
      const values={};
      vals.forEach(v=>{values[v.account_name]=parseFloat(v.value)||0;});
      return {date:e.entry_date,values,_id:e.id};
    });

    // Always upsert settings on login to ensure row exists
    const trialStart = s?.trial_start || new Date().toISOString();
    const subStatus = s?.subscription_status || 'trialing';

    if(!s){
      // First login — create settings row
      await sb.from('user_settings').upsert({
        user_id:currentUser.id,

        subscription_status:'trialing',
        forecast_years:3,
        lookback_months:12,
        updated_at:new Date().toISOString()
      },{onConflict:'user_id'});
    }

    // Map settings
    settings={
      forecastYears:s?.forecast_years||3,
      lookbackMonths:s?.lookback_months||12,
      birthday:s?.birthday||'',
      goalAmount:s?.goal_amount||''
    };

    // Check onboarding
    if(shouldShowOnboarding(s)){
      // Show after dashboard renders
      setTimeout(()=>showOnboarding(),300);
    }

    // Check subscription access
    const access=checkAccess(s ? s : {trial_start:trialStart,subscription_status:'trialing'});
    if(!access.allowed){
      sessionStorage.setItem('nw_paywall','1');
      showPaywall();
      setSyncBar('');
      return;
    }
    // Access granted — always clear paywall flag
    sessionStorage.removeItem('nw_paywall');
    window._paywallActive=false;
    window._accessGranted=true;
    $('app').style.display='block';
    hidePaywall();
    // Show trial countdown in topbar
    if(access.status==='trialing'&&access.daysLeft!==null){
      const bar=$('sync-bar');

      }
    }

    setSyncBar('');
  } catch(e){
    console.error('Load error:',e);
    // Show app anyway with empty data — don't block on errors
    accounts=JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));
    entries=[];
    sessionStorage.removeItem('nw_paywall');
    window._accessGranted=true;
    $('app').style.display='block';
    setSyncBar('Could not load data — check connection','var(--red)');

  }

async function saveEntryToSupabase(entry){
  if(!currentUser) return;
  try{
    // Upsert entry row
    const {data:entRow,error:ee}=await sb.from('entries')
      .upsert({user_id:currentUser.id,entry_date:entry.date},{onConflict:'user_id,entry_date'})
      .select().single();
    if(ee) throw ee;

    // Delete old values and re-insert
    await sb.from('entry_values').delete().eq('entry_id',entRow.id);
    const valRows=Object.entries(entry.values)
      .filter(([,v])=>v>0)
      .map(([name,value])=>({entry_id:entRow.id,account_name:name,value}));
    if(valRows.length>0){
      const {error:ve}=await sb.from('entry_values').insert(valRows);
      if(ve) throw ve;
    }
    return entRow.id;
  } catch(e){console.error('Save entry error:',e);throw e;}
}

    }
  }
  fv={};switchTab('dashboard');
}

      <div class="auth-sub">Set a new password for your account.</div>
      <div class="auth-field"><label>New password</label><input type="password" id="reset-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitReset()"/></div>
      <div class="auth-field"><label>Confirm password</label><input type="password" id="reset-pw2" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitReset()"/></div>
      <div class="auth-err" id="auth-err"></div>
      <div class="auth-ok" id="auth-ok"></div>
      <button class="primary" style="width:100%;padding:10px;font-size:14px" onclick="submitReset()">Set new password</button>
    `;
  }
}

async function submitReset(){
  const pw=($('reset-pw')?.value||'').trim();
  const pw2=($('reset-pw2')?.value||'').trim();
  const err=$('auth-err'),ok=$('auth-ok');
  if(err)err.textContent='';if(ok)ok.textContent='';
  if(!pw){if(err)err.textContent='Please enter a new password.';return;}
  if(pw.length<6){if(err)err.textContent='Password must be at least 6 characters.';return;}
  if(pw!==pw2){if(err)err.textContent='Passwords do not match.';return;}
  try{
    const {error}=await sb.auth.updateUser({password:pw});
    if(error) throw error;
    if(ok)ok.textContent='Password updated! Signing you in...';
    _recoverySession=null;
    window.location.hash='';
    setTimeout(async()=>{
      const {data:{session}}=await sb.auth.getSession();
      if(session?.user) await bootUser(session.user);
    },1200);
  } catch(e){
    if(err)err.textContent=e.message||'Something went wrong.';
  }
}
</script>
</body>
</html>
